name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.4.0 or v1.4.0)"
        required: true
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    env:
      PROJECT_PATH: MinecraftLocalizer/MinecraftLocalizer.csproj
      PUBLISH_DIR: artifacts/publish/win-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: metadata
        shell: pwsh
        run: |
          $rawVersion = "${{ github.event.inputs.version }}".Trim()
          if ([string]::IsNullOrWhiteSpace($rawVersion)) {
            throw "Version input is required."
          }

          $tag = if ($rawVersion.StartsWith("v")) { $rawVersion } else { "v$rawVersion" }
          $version = $tag.Substring(1)
          $releaseName = "Minecraft Localizer $tag"
          $notesPath = "docs/releases/$tag.md"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Ensure tag exists
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $tag = "${{ steps.metadata.outputs.tag }}"
          $remoteTag = git ls-remote --tags origin $tag

          if ([string]::IsNullOrWhiteSpace($remoteTag)) {
            git tag $tag
            git push origin $tag
          } else {
            Write-Host "Tag $tag already exists on origin."
          }

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish application
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=false
          -p:DebugType=None
          -o ${{ env.PUBLISH_DIR }}

      - name: Include release assets
        shell: pwsh
        run: |
          Copy-Item LICENSE.txt ${{ env.PUBLISH_DIR }}
          if (Test-Path README.md) {
            Copy-Item README.md ${{ env.PUBLISH_DIR }}
          }

      - name: Pack release archive
        id: archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/dist | Out-Null
          $archivePath = "artifacts/dist/MinecraftLocalizer-${{ steps.metadata.outputs.tag }}-win-x64.zip"
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive -Path "${{ env.PUBLISH_DIR }}\\*" -DestinationPath $archivePath
          "path=$archivePath" >> $env:GITHUB_OUTPUT

      - name: Prepare release notes
        id: notes
        shell: pwsh
        run: |
          $notesPath = "${{ steps.metadata.outputs.notes_path }}"
          $bodyPath = "artifacts/release-body.md"

          if (Test-Path $notesPath) {
            Copy-Item $notesPath $bodyPath
          } else {
            @"
          ## Release

          - Automated release for ${{ steps.metadata.outputs.tag }}.
          - No dedicated release notes file was found at `$notesPath`.
          "@ | Set-Content $bodyPath
          }

          "body_path=$bodyPath" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.release_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: ${{ steps.archive.outputs.path }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
